apiVersion: apps/v1
kind: Deployment
metadata:
  name: medico-legal-pro
  labels:
    app: medico-legal-pro
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: medico-legal-pro
  template:
    metadata:
      labels:
        app: medico-legal-pro
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user in alpine image
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # Replace with your registry / tag in CI
          image: ghcr.io/your-org/medico-legal-pro:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx writes to /var/cache, /var/run
            capabilities:
              drop: ["ALL"]
          # Liveness — restart if pod is wedged
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Readiness — pull from Service if not ready
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          # Startup — gives slow boots room before liveness kicks in
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: medico-legal-pro
  labels:
    app: medico-legal-pro
spec:
  type: ClusterIP
  selector:
    app: medico-legal-pro
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medico-legal-pro
  annotations:
    # Adjust for your ingress controller (nginx, traefik, alb, etc.)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kamedico-legal.co.za
      secretName: medico-legal-pro-tls
  rules:
    - host: kamedico-legal.co.za
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medico-legal-pro
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medico-legal-pro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medico-legal-pro
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: medico-legal-pro
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: medico-legal-pro
