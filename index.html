    <style>
      /* Splash screen — full-bleed brand gradient shown until the React app mounts. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: linear-gradient(135deg, #00BAAD 0%, #4fd8ce 45%, #ffffff 100%);
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        transition: opacity 450ms ease-out, transform 450ms ease-out;
        will-change: opacity, transform;
      }
      #app-splash.splash-hidden {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }
      #app-splash .splash-logo-ring {
        width: 132px;
        height: 132px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22), inset 0 0 0 2px rgba(255, 255, 255, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        animation: splash-pulse 2.4s ease-in-out infinite;
      }
      #app-splash .splash-logo-ring img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.25));
      }
      #app-splash .splash-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.18);
      }
      #app-splash .splash-sub {
        margin-top: -14px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: rgba(255, 255, 255, 0.85);
      }
      #app-splash .splash-spinner {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: #ffffff;
        animation: splash-spin 0.9s linear infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-logo-ring,
        #app-splash .splash-spinner { animation: none; }
      }
      /* Hide Lovable edit badge if it appears on this deployment. */
      #lovable-badge,
      [id^="lovable-badge"],
      a[href*="lovable.dev"][class*="badge"],
      div[class*="lovable-badge"] {

        opacity: 0 !important;
        pointer-events: none !important;

  <body>
    <div id="root"></div>

    <div id="app-splash" role="status" aria-label="Loading Medico-Legal Pro">
      <div class="splash-logo-ring">
        <img src="/lovable-uploads/logo-icon-192.png" alt="Kutlwano & Associate" />
      </div>
      <div class="splash-title">Medico-Legal Pro</div>
      <div class="splash-sub">Kutlwano &amp; Associate</div>
      <div class="splash-spinner"></div>
    </div>

    <script>
      // Hide the splash once React has mounted the app, with a small
      // minimum-visible-time floor so the welcome branding always registers
      // even on a very fast/cached load. This never adds delay beyond real
      // load time: if the app takes longer than MIN_DISPLAY_MS to mount,
      // the splash hides the instant it's ready, no extra wait added.
      //
      // Uses a MutationObserver (not polling) to detect the app mounting,
      // so there's no unnecessary lag on top of the real load time either.
      //
      // This element is removed from the DOM entirely after its one
      // appearance, so it structurally cannot reappear later in the
      // session (e.g. after signing in) — only a full page reload
      // recreates it, which is the correct "welcome to the app" moment.
      (function () {
        var MIN_DISPLAY_MS = 900;
        var startedAt = Date.now();
        var hidden = false;

        var hide = function () {
          if (hidden) return;
          hidden = true;
          var el = document.getElementById('app-splash');
          if (!el) return;
          el.classList.add('splash-hidden');
          window.setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
        };

        var hideAfterMinimum = function () {
          var remaining = MIN_DISPLAY_MS - (Date.now() - startedAt);
          if (remaining > 0) {
            window.setTimeout(hide, remaining);
          } else {
            hide();
          }
        };

        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) {
          hideAfterMinimum();
        } else if (root && 'MutationObserver' in window) {
          var observer = new MutationObserver(function () {
            if (root.childElementCount > 0) {
              observer.disconnect();
              hideAfterMinimum();
            }
          });
          observer.observe(root, { childList: true });
        }

        // Safety net: never let the splash get stuck if mounting fails.
        window.setTimeout(hide, 6000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
