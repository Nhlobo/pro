      #app-splash .splash-ring {

        backdrop-filter: blur(6px);

        transform: scale(0.72);
        opacity: 0;
        animation: splash-ring-in 560ms cubic-bezier(.2,.8,.2,1) 80ms forwards;
      }

      /* The logo itself: built from real vector paths (not a raster image), so

      #app-splash .splash-logo-svg {
        position: relative;
        width: 96px;
        height: 96px;
        overflow: visible;
        filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.22));
        animation: splash-logo-breathe 2.6s ease-in-out 1.55s infinite;
        transform-origin: 50% 50%;
      }
      #app-splash .splash-seg {
        fill: #0A95EB;
        fill-opacity: 0;
        stroke: #0A95EB;
        stroke-width: 3.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: var(--len);
        stroke-dashoffset: var(--len);
        animation:
          splash-draw 620ms cubic-bezier(.4,0,.2,1) forwards,
          splash-fill 420ms ease forwards;
        animation-delay:
          calc(var(--i) * 85ms),

    <script>
      // Hide the splash once React has mounted the app, with a small
      // minimum-visible-time floor so the welcome branding always registers
      // even on a very fast/cached load. This never adds delay beyond real
      // load time: if the app takes longer than MIN_DISPLAY_MS to mount,
      // the splash hides the instant it's ready, no extra wait added.
      //
      // Uses a MutationObserver (not polling) to detect the app mounting,
      // so there's no unnecessary lag on top of the real load time either.
      //
      // This element is removed from the DOM entirely after its one
      // appearance, so it structurally cannot reappear later in the
      // session (e.g. after signing in) — only a full page reload
      // recreates it, which is the correct "welcome to the app" moment.
      (function () {
        var MIN_DISPLAY_MS = 1800;
        var startedAt = Date.now();
        var hidden = false;

        var hide = function () {
          if (hidden) return;
          hidden = true;
          var el = document.getElementById('app-splash');
          if (!el) return;
          el.classList.add('splash-hidden');
          window.setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
        };

        var hideAfterMinimum = function () {
          var remaining = MIN_DISPLAY_MS - (Date.now() - startedAt);
          if (remaining > 0) {
            window.setTimeout(hide, remaining);
          } else {
            hide();
          }
        };

        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) {
          hideAfterMinimum();
        } else if (root && 'MutationObserver' in window) {
          var observer = new MutationObserver(function () {
            if (root.childElementCount > 0) {
              observer.disconnect();
              hideAfterMinimum();
            }
          });
          observer.observe(root, { childList: true });
        }

        // Safety net: never let the splash get stuck if mounting fails.
        window.setTimeout(hide, 6000);
      })();
    </script>

  </body>
