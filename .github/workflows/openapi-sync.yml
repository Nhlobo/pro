name: openapi-sync

on:
  push:
    paths:
      - "docs/openapi.yaml"
      - "supabase/functions/**"
      - "scripts/check-openapi-sync.ts"
      - ".github/workflows/openapi-sync.yml"
  pull_request:
    paths:
      - "docs/openapi.yaml"
      - "supabase/functions/**"
      - "scripts/check-openapi-sync.ts"
      - ".github/workflows/openapi-sync.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Verify OpenAPI spec is in sync with edge functions
        run: bun run scripts/check-openapi-sync.ts
